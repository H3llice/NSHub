<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Natal Safety App</title>
  <link href="../css/login.css" rel="stylesheet">
</head>
<body>

  <div class="login-card">
    <div class="login-header">
      <h1>Natal Safety <span>App</span></h1>
      <p>Faça login para continuar</p>
    </div>

    <div class="login-body">
      <div class="erro" id="erro-login"></div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="login-senha" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn-entrar" id="btn-entrar" onclick="fazerLogin()">Entrar</button>
    </div>
  </div>

  <script>
    const API = 'http://localhost:3000'

    // Se já tiver token válido, vai direto pro sistema
    const token = localStorage.getItem('ns_token')
    if (token) {
      window.location.href = './index.html'
    }

    // Permite login com Enter
    document.getElementById('login-senha').addEventListener('keydown', e => {
      if (e.key === 'Enter') fazerLogin()
    })

    async function fazerLogin() {
      const email = document.getElementById('login-email').value.trim()
      const senha = document.getElementById('login-senha').value
      const btn   = document.getElementById('btn-entrar')
      const erro  = document.getElementById('erro-login')

      erro.classList.remove('show')

      if (!email || !senha) {
        erro.textContent = 'Preencha email e senha.'
        erro.classList.add('show')
        return
      }

      btn.disabled = true
      btn.textContent = 'Entrando...'

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        })

        const data = await res.json()

        if (!res.ok) {
          erro.textContent = data.erro || 'Erro ao fazer login.'
          erro.classList.add('show')
          return
        }

        // Salva token e dados do usuário
        localStorage.setItem('ns_token', data.token)
        localStorage.setItem('ns_usuario', JSON.stringify(data.usuario))

        window.location.href = './index.html'

      } catch {
        erro.textContent = 'Não foi possível conectar ao servidor.'
        erro.classList.add('show')
      } finally {
        btn.disabled = false
        btn.textContent = 'Entrar'
      }
    }
  </script>

</body>
</html>
